# Proxy http://localhost/ → SiteChat on port 8000 (macOS system Apache)
#
# 1. Enable modules (once):
#    sudo sed -i '' 's/#LoadModule proxy_module/LoadModule proxy_module/' /private/etc/apache2/httpd.conf
#    sudo sed -i '' 's/#LoadModule proxy_http_module/LoadModule proxy_http_module/' /private/etc/apache2/httpd.conf
#
# 2. Include this file. Add to END of /private/etc/apache2/httpd.conf:
#    Include /Users/YOU/Sites/projects/sitechat/deploy/apache-sitechat.conf
#    (use the full path to this repo)
#
# 3. Comment out or remove the default DocumentRoot block for :80 if "It works!" still wins,
#    or set this vhost as first loaded. Restart: sudo apachectl restart
#
# 4. Run SiteChat: cd backend && python3 -m uvicorn app.main:app --host 127.0.0.1 --port 8000

<VirtualHost *:80>
    ServerName localhost
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8000/
    ProxyPassReverse / http://127.0.0.1:8000/
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"
</VirtualHost>
